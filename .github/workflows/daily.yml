name: Daily Update Agent
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # THIS SECTION BELOW IS THE KEY
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Run Agent
        run: python agent.py

      - name: Save the News
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "Updated news for today" || echo "No changes"
          git push
