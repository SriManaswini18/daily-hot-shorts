name: Daily Update Agent
on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight every day
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial for saving the news!
    steps:
      - uses: actions/checkout@v3
      - name: Run Agent
        run: python agent.py
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "Daily News: $(date)" || echo "No changes to commit"
          git push
