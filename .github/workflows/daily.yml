name: Daily Update Agent
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # This is the "Key" to the repo
    steps:
      - uses: actions/checkout@v3

      - name: Run Agent
        run: python agent.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          # This next line is the magic fix for "Failure" errors
          git commit -m "Daily News Update" || exit 0 
          git push
